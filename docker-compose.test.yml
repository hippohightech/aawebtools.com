# Lightweight local test — just nginx serving static pages
# Usage: docker compose -f docker-compose.test.yml up
services:
  nginx-test:
    image: nginx:1.25-alpine
    container_name: aawebtools-test
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/var/www/aawebtools:ro
      - ./nginx/test.conf:/etc/nginx/conf.d/default.conf:ro
