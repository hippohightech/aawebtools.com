# Netdata custom alerts for aawebtools.com VPS
# Deploy: copy to /etc/netdata/health.d/aawebtools.conf on VPS

# CPU usage alert — warn at 85% for 5 minutes
alarm: cpu_high_usage
    on: system.cpu
lookup: average -5m unaligned of user,system,softirq,irq
 units: %
 every: 1m
  warn: $this > 85
  crit: $this > 95
 delay: up 2m down 5m
  info: CPU usage is above 85% for 5 minutes
    to: sysadmin

# RAM usage alert — warn at 90%
alarm: ram_high_usage
    on: system.ram
lookup: average -1m unaligned of used
  calc: $this * 100 / ($this + $free + $cached + $buffers)
 units: %
 every: 1m
  warn: $this > 90
  crit: $this > 95
 delay: up 1m down 5m
  info: RAM usage is above 90%
    to: sysadmin

# Disk space alert — warn at 80%
alarm: disk_space_high
    on: disk.space
lookup: average -1m unaligned of used
  calc: $this * 100 / ($this + $avail)
 units: %
 every: 1m
  warn: $this > 80
  crit: $this > 90
 delay: up 1m down 5m
  info: Disk usage is above 80%
    to: sysadmin
