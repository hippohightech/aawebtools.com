# Netdata health alarm notification configuration
# Sends alerts to Telegram via bot token from .env
# Deploy: copy to /etc/netdata/health_alarm_notify.conf on VPS

# Telegram
SEND_TELEGRAM="YES"
TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN}"
DEFAULT_RECIPIENT_TELEGRAM="${TELEGRAM_CHAT_ID}"

# Disable all other notification methods
SEND_EMAIL="NO"
SEND_SLACK="NO"
SEND_DISCORD="NO"
SEND_PUSHOVER="NO"
SEND_PUSHBULLET="NO"
SEND_PD="NO"
SEND_TWILIO="NO"
SEND_CUSTOM="NO"
