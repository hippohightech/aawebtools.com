# docker-compose.yml — aawebtools.com — Final production config (Section 13)
#
# UFW FIREWALL RULES — Apply on VPS before deployment:
#   sudo ufw default deny incoming
#   sudo ufw default allow outgoing
#   sudo ufw allow 22/tcp
#   sudo ufw allow 80/tcp
#   sudo ufw allow 443/tcp
#   sudo ufw enable

version: '3.8'

services:
  # 1. Nginx reverse proxy — only external-facing container
  nginx:
    image: nginx:1.25-alpine
    container_name: aawebtools-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend:/var/www/aawebtools:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      node-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3
    restart: always
    networks:
      - frontend
      - monitoring

  # SSL auto-renewal
  certbot:
    image: certbot/certbot:v2.7.4
    container_name: aawebtools-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: always

  # 2. Node.js API
  node-api:
    build: ./api
    container_name: aawebtools-api
    env_file: .env
    environment:
      - NODE_ENV=${NODE_ENV}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
    networks:
      - frontend
      - backend

  # 3. Python API (skeleton)
  python-api:
    build: ./python-api
    container_name: aawebtools-python
    expose:
      - "8000"
    restart: always
    networks:
      - frontend
      - backend

  # 4. Uptime Kuma
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: aawebtools-uptime-kuma
    volumes:
      - ./monitoring/uptime-kuma:/app/data
    expose:
      - "3001"
    restart: always
    networks:
      - monitoring

  # 5. Netdata
  netdata:
    image: netdata/netdata:v1.44
    container_name: aawebtools-netdata
    expose:
      - "19999"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
    networks:
      - monitoring

  # 6. Umami analytics
  umami:
    image: ghcr.io/umami-software/umami:postgresql-v2.10.2
    container_name: aawebtools-umami
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      - umami-db
    restart: always
    networks:
      - monitoring

  # 7. Umami PostgreSQL
  umami-db:
    image: postgres:15-alpine
    container_name: aawebtools-umami-db
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - ./analytics/umami:/var/lib/postgresql/data
    restart: always
    networks:
      - monitoring

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
  monitoring:
    driver: bridge
    internal: true

volumes:
  nginx-logs:
    driver: local
