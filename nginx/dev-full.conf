# dev-full.conf — Local dev with API proxy (no SSL, no rate limiting)
server {
    listen 80;
    server_name _;

    root /var/www/aawebtools;
    index index.html;

    absolute_redirect off;

    # API proxy — Node.js
    location /api/ {
        proxy_pass http://aawebtools-dev-api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    # API download proxy
    location /api/download/ {
        proxy_pass http://aawebtools-dev-api:3000/download/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    # Language-prefixed pages
    location ~ ^/(fr|es|de|pt|ar|id|hi)(/.*)?$ {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Static assets
    location ~* \.(css|js|png|jpg|jpeg|svg|ico|woff2|woff|ttf|webp|json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Catch-all
    location / {
        try_files $uri $uri/ $uri/index.html /404.html;
    }

    error_page 404 /404.html;
    location = /404.html { internal; }
}
