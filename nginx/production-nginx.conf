worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    # Exempt internal Docker traffic (Uptime Kuma, etc.) from rate limiting
    geo $is_internal {
        default         0;
        172.16.0.0/12   1;
        10.0.0.0/8      1;
        127.0.0.0/8     1;
    }

    # Exempt search engine bots and internal services from rate limiting
    map $http_user_agent $limit_bot {
        default         $binary_remote_addr;
        "~*Googlebot"   "";
        "~*bingbot"     "";
    }

    # Combined: skip rate limiting for bots OR internal IPs
    map $is_internal $limit_key {
        1       "";
        default $limit_bot;
    }

    # Rate limiting zones (must be in http context)
    limit_req_zone $limit_key zone=general:10m rate=30r/m;
    limit_req_zone $limit_key zone=api:10m rate=10r/m;
    limit_req_zone $limit_key zone=download:10m rate=5r/m;

    include /etc/nginx/conf.d/*.conf;
}
