worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    # Exempt search engine bots from rate limiting
    map $http_user_agent $limit_key {
        default         $binary_remote_addr;
        "~*Googlebot"   "";
        "~*bingbot"     "";
        "~*Uptime-Kuma" "";
    }

    # Rate limiting zones (must be in http context)
    # 200r/m for pages, 30r/m for API, 10r/m for downloads
    limit_req_zone $limit_key zone=general:10m rate=200r/m;
    limit_req_zone $limit_key zone=api:10m rate=30r/m;
    limit_req_zone $limit_key zone=download:10m rate=10r/m;

    include /etc/nginx/conf.d/*.conf;
}
