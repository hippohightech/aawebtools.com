# aawebtools.conf — Final production config (Section 13)

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name aawebtools.com www.aawebtools.com
                monitor.aawebtools.com netdata.aawebtools.com analytics.aawebtools.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main site — HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aawebtools.com www.aawebtools.com;

    # SSL
    ssl_certificate /etc/letsencrypt/live/aawebtools.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aawebtools.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CSP
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://pagead2.googlesyndication.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com; frame-src https://googleads.g.doubleclick.net;" always;

    # Document root
    root /var/www/aawebtools;
    index index.html;

    # Environment variable injection for ad placeholders
    set $propellerads_zone_tiktok '';
    set $propellerads_zone_twitter '';
    set $adsense_publisher_id '';
    sub_filter_once off;
    sub_filter '${PROPELLERADS_ZONE_TIKTOK}' $propellerads_zone_tiktok;
    sub_filter '${PROPELLERADS_ZONE_TWITTER}' $propellerads_zone_twitter;
    sub_filter '${ADSENSE_PUBLISHER_ID}' $adsense_publisher_id;

    # Homepage
    location = / {
        limit_req zone=general burst=5 nodelay;
        try_files /index.html =404;
    }

    # Tool pages — explicit routing with trailing slash
    location /tiktok-downloader/ {
        limit_req zone=general burst=5 nodelay;
        try_files $uri $uri/ /tiktok-downloader/index.html;
    }

    location /twitter-video-downloader/ {
        limit_req zone=general burst=5 nodelay;
        try_files $uri $uri/ /twitter-video-downloader/index.html;
    }

    location /invoice-generator/ {
        limit_req zone=general burst=5 nodelay;
        try_files $uri $uri/ /invoice-generator/index.html;
    }

    location /ai-detector/ {
        limit_req zone=general burst=5 nodelay;
        try_files $uri $uri/ /ai-detector/index.html;
    }

    location /ai-humanizer/ {
        limit_req zone=general burst=5 nodelay;
        try_files $uri $uri/ /ai-humanizer/index.html;
    }

    location /paystub-generator/ {
        limit_req zone=general burst=5 nodelay;
        try_files $uri $uri/ /paystub-generator/index.html;
    }

    # Static assets — 1 year cache
    location ~* \.(css|js|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # General static fallback
    location / {
        limit_req zone=general burst=5 nodelay;
        try_files $uri $uri/ /404.html;
    }

    # API proxy
    location /api/ {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://node-api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Download endpoints — strict rate limit
    location /api/download/ {
        limit_req zone=download burst=5 nodelay;
        proxy_pass http://node-api:3000/download/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Python API proxy
    location /py-api/ {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://python-api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Block attack paths
    location ~* ^/(wp-admin|wp-login|xmlrpc\.php|\.env|\.git|cgi-bin) {
        return 444;
    }

    # Custom error pages
    error_page 404 /404.html;
    location = /404.html { internal; }

    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"success":false,"data":null,"message":"Too many requests. Please try again later."}';
    }
}

# Uptime Kuma — monitor.aawebtools.com (IP-restricted)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name monitor.aawebtools.com;
    ssl_certificate /etc/letsencrypt/live/aawebtools.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aawebtools.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    allow ${OWNER_IP};
    deny all;
    location / {
        proxy_pass http://uptime-kuma:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

