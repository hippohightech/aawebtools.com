# production.conf — Internal nginx behind Traefik
# Traefik handles SSL, HSTS, security headers
# This nginx serves static files + proxies API requests

server {
    listen 80;
    server_name _;

    root /var/www/aawebtools;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json
               application/javascript text/javascript application/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=download:10m rate=5r/m;

    # Homepage
    location = / {
        limit_req zone=general burst=5 nodelay;
        try_files $uri /index.html;
    }

    # Tool pages
    location /tiktok-downloader/ {
        limit_req zone=general burst=5 nodelay;
        try_files $uri $uri/index.html =404;
    }
    location /twitter-video-downloader/ {
        limit_req zone=general burst=5 nodelay;
        try_files $uri $uri/index.html =404;
    }
    location /invoice-generator/ {
        limit_req zone=general burst=5 nodelay;
        try_files $uri $uri/index.html =404;
    }
    location /ai-detector/ {
        limit_req zone=general burst=5 nodelay;
        try_files $uri $uri/index.html =404;
    }
    location /ai-humanizer/ {
        limit_req zone=general burst=5 nodelay;
        try_files $uri $uri/index.html =404;
    }
    location /paystub-generator/ {
        limit_req zone=general burst=5 nodelay;
        try_files $uri $uri/index.html =404;
    }

    # Static assets — long cache
    location ~* \.(css|js|png|jpg|jpeg|svg|ico|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API proxy — Node.js
    location /api/ {
        limit_req zone=api burst=3 nodelay;
        proxy_pass http://aawebtools-api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API download proxy — stricter rate limit
    location /api/download/ {
        limit_req zone=download burst=2 nodelay;
        proxy_pass http://aawebtools-api:3000/download/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Python API proxy
    location /api/python/ {
        proxy_pass http://aawebtools-python:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Block attack paths
    location ~* ^/(wp-admin|wp-login|\.env|\.git|cgi-bin|phpmyadmin|xmlrpc\.php) {
        return 444;
    }

    # robots.txt and sitemap
    location = /robots.txt { try_files $uri =404; }
    location = /sitemap.xml { try_files $uri =404; }

    # Custom 404
    error_page 404 /404.html;
    location = /404.html { internal; }

    # Custom 429
    error_page 429 /429.html;
}
