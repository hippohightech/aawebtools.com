<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backlink Bot - AAWebTools</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div class="header">
    <h1><span>Backlink Bot</span> &mdash; AAWebTools</h1>
    <div class="header-right">
      <div class="status-dot running" id="statusDot"></div>
      <span class="status-label" id="statusLabel">Connected</span>
      <button class="btn btn-warning" id="pauseBtn" onclick="togglePause()">Pause</button>
    </div>
  </div>

  <div class="main">
    <div class="content">
      <!-- Stats -->
      <div class="stats">
        <div class="stat-card total"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total</div></div>
        <div class="stat-card pending"><div class="stat-value" id="statPending">0</div><div class="stat-label">Pending</div></div>
        <div class="stat-card running"><div class="stat-value" id="statRunning">0</div><div class="stat-label">Running</div></div>
        <div class="stat-card completed"><div class="stat-value" id="statCompleted">0</div><div class="stat-label">Completed</div></div>
        <div class="stat-card failed"><div class="stat-value" id="statFailed">0</div><div class="stat-label">Failed</div></div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn btn-primary" onclick="showModal()">+ Add Task</button>
        <button class="btn btn-ghost" onclick="batchCreate('directories')">+ All Directories</button>
        <button class="btn btn-ghost" onclick="batchCreate('articles')">+ All Articles</button>
        <button class="btn btn-ghost" onclick="batchCreate('bookmarking')">+ All Bookmarks</button>
        <button class="btn btn-ghost" onclick="refreshTasks()" style="margin-left:auto;">Refresh</button>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Type</th>
              <th>Target</th>
              <th>Title</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="taskTable">
            <tr><td colspan="6" class="empty-state"><h3>No tasks yet</h3>Click "+ Add Task" or batch buttons above to get started</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Sidebar: Live logs -->
    <div class="sidebar">
      <div class="sidebar-header">Live Activity</div>
      <div class="log-feed" id="logFeed">
        <div class="log-entry"><span class="time">--:--:--</span> <span class="msg">Waiting for activity...</span></div>
      </div>
    </div>
  </div>

  <!-- Add Task Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>Add New Task</h2>
      <div class="form-group">
        <label>Task Type</label>
        <select id="taskType" onchange="updateTargetOptions()">
          <option value="directory">Directory Submission</option>
          <option value="article">Article Posting</option>
          <option value="bookmarking">Social Bookmarking</option>
          <option value="email">Email Outreach</option>
          <option value="haro">HARO Response</option>
        </select>
      </div>
      <div class="form-group">
        <label>Target Site</label>
        <input id="taskTarget" placeholder="e.g. Product Hunt, Medium, etc.">
      </div>
      <div class="form-group">
        <label>Title</label>
        <input id="taskTitle" placeholder="Task title">
      </div>
      <div class="form-group">
        <label>Description (optional)</label>
        <textarea id="taskDesc" placeholder="Additional details..."></textarea>
      </div>
      <div class="form-group" id="configGroup">
        <label>Config (JSON)</label>
        <textarea id="taskConfig" placeholder='{"submit_url": "https://..."}'>{}</textarea>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="hideModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createTask()">Create Task</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
