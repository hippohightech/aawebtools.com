site:
  name: "AAWebTools"
  url: "https://aawebtools.com"
  description: "Free online tools — TikTok downloader, invoice generator, AI detector, and more. No signup required."
  tagline: "Free online web tools — no login required"
  owner: "Karim Narimi"
  company: "ScopeCove"
  company_url: "https://scopecove.com"

tools:
  - name: "TikTok Video Downloader"
    path: "/tiktok-downloader/"
    keywords: ["tiktok downloader", "download tiktok without watermark", "tiktok video downloader"]
  - name: "Twitter Video Downloader"
    path: "/twitter-video-downloader/"
    keywords: ["twitter video downloader", "x video downloader", "download twitter video"]
  - name: "Free Invoice Generator"
    path: "/invoice-generator/"
    keywords: ["free invoice generator", "invoice maker", "invoice generator no sign up"]
  - name: "AI Content Detector"
    path: "/ai-detector/"
    keywords: ["ai content detector", "free ai detector", "chatgpt detector"]
  - name: "AI Text Humanizer"
    path: "/ai-humanizer/"
    keywords: ["ai humanizer", "humanize ai text", "ai content humanizer"]
  - name: "Pay Stub Generator"
