# docker-compose.production.yml — aawebtools.com on shared Traefik VPS
# Deploy: docker compose -f docker-compose.production.yml up -d

services:
  # Nginx — serves frontend + proxies to node-api
  aawebtools-nginx:
    image: nginx:1.25-alpine
    container_name: aawebtools-nginx
    volumes:
      - ./nginx/production-nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/var/www/aawebtools:ro
    depends_on:
      aawebtools-api:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=shared-network
      # Main domain
      - traefik.http.routers.aawebtools.rule=Host(`aawebtools.com`) || Host(`www.aawebtools.com`)
      - traefik.http.routers.aawebtools.tls=true
      - traefik.http.routers.aawebtools.entrypoints=web,websecure
      - traefik.http.routers.aawebtools.tls.certresolver=mytlschallenge
      - traefik.http.services.aawebtools.loadbalancer.server.port=80
      # Security headers
      - traefik.http.middlewares.aawebtools-headers.headers.SSLRedirect=true
      - traefik.http.middlewares.aawebtools-headers.headers.STSSeconds=31536000
      - traefik.http.middlewares.aawebtools-headers.headers.STSIncludeSubdomains=true
      - traefik.http.middlewares.aawebtools-headers.headers.browserXSSFilter=true
      - traefik.http.middlewares.aawebtools-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.aawebtools-headers.headers.forceSTSHeader=true
      - traefik.http.middlewares.aawebtools-headers.headers.frameDeny=true
      - traefik.http.middlewares.aawebtools-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.aawebtools-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()
      # www redirect to non-www
      - traefik.http.middlewares.aawebtools-www.redirectregex.regex=^https://www\.aawebtools\.com/(.*)
      - traefik.http.middlewares.aawebtools-www.redirectregex.replacement=https://aawebtools.com/$${1}
      - traefik.http.middlewares.aawebtools-www.redirectregex.permanent=true
      - traefik.http.routers.aawebtools.middlewares=aawebtools-headers@docker,aawebtools-www@docker
      # Compression
      - traefik.http.middlewares.aawebtools-compress.compress=true
    restart: always
    networks:
      - shared-network
      - aawebtools-internal

  # Node.js API — downloaders + humanizer
  aawebtools-api:
    build: ./api
    container_name: aawebtools-api
    env_file: .env
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: always
    networks:
      - aawebtools-internal

  # Python API (skeleton)
  aawebtools-python:
    build: ./python-api
    container_name: aawebtools-python
    expose:
      - "8000"
    restart: always
    networks:
      - aawebtools-internal

  # Umami Analytics — privacy-first, cookie-free
  aawebtools-umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: aawebtools-umami
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@aawebtools-umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      - aawebtools-umami-db
    labels:
      - traefik.enable=true
      - traefik.docker.network=shared-network
      - traefik.http.routers.aawebtools-analytics.rule=Host(`analytics.aawebtools.com`)
      - traefik.http.routers.aawebtools-analytics.tls=true
      - traefik.http.routers.aawebtools-analytics.entrypoints=web,websecure
      - traefik.http.routers.aawebtools-analytics.tls.certresolver=mytlschallenge
      - traefik.http.services.aawebtools-analytics.loadbalancer.server.port=3000
    restart: always
    networks:
      - shared-network
      - aawebtools-internal

  # Umami PostgreSQL
  aawebtools-umami-db:
    image: postgres:15-alpine
    container_name: aawebtools-umami-db
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - aawebtools-umami-data:/var/lib/postgresql/data
    restart: always
    networks:
      - aawebtools-internal

  # Uptime Kuma — monitoring + Telegram alerts
  aawebtools-uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: aawebtools-uptime-kuma
    volumes:
      - aawebtools-kuma-data:/app/data
    labels:
      - traefik.enable=true
      - traefik.docker.network=shared-network
      - traefik.http.routers.aawebtools-monitor.rule=Host(`monitor.aawebtools.com`)
      - traefik.http.routers.aawebtools-monitor.tls=true
      - traefik.http.routers.aawebtools-monitor.entrypoints=web,websecure
      - traefik.http.routers.aawebtools-monitor.tls.certresolver=mytlschallenge
      - traefik.http.services.aawebtools-monitor.loadbalancer.server.port=3001
    restart: always
    networks:
      - shared-network

  # Netdata — server metrics
  aawebtools-netdata:
    image: netdata/netdata:v1.44
    container_name: aawebtools-netdata
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=shared-network
      - traefik.docker.network=shared-network
      - traefik.http.routers.aawebtools-netdata.rule=Host(`netdata.aawebtools.com`)
      - traefik.http.routers.aawebtools-netdata.tls=true
      - traefik.http.routers.aawebtools-netdata.entrypoints=web,websecure
      - traefik.http.routers.aawebtools-netdata.tls.certresolver=mytlschallenge
      - traefik.http.services.aawebtools-netdata.loadbalancer.server.port=19999
    restart: always
    networks:
      - shared-network

volumes:
  aawebtools-umami-data:
    driver: local
  aawebtools-kuma-data:
    driver: local

networks:
  shared-network:
    external: true
  aawebtools-internal:
    driver: bridge
