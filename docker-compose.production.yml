# docker-compose.production.yml — aawebtools.com on shared Traefik VPS
# Deploy: docker compose -f docker-compose.production.yml up -d

services:
  # Nginx — serves frontend + proxies to node-api
  aawebtools-nginx:
    image: nginx:1.25-alpine
    container_name: aawebtools-nginx
    volumes:
      - ./nginx/production-nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/var/www/aawebtools:ro
    depends_on:
      aawebtools-api:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=shared-network
      # Main domain
      - traefik.http.routers.aawebtools.rule=Host(`aawebtools.com`) || Host(`www.aawebtools.com`)
      - traefik.http.routers.aawebtools.tls=true
      - traefik.http.routers.aawebtools.entrypoints=web,websecure
      - traefik.http.routers.aawebtools.tls.certresolver=mytlschallenge
      - traefik.http.services.aawebtools.loadbalancer.server.port=80
      # Security headers
      - traefik.http.middlewares.aawebtools-headers.headers.SSLRedirect=true
      - traefik.http.middlewares.aawebtools-headers.headers.STSSeconds=31536000
      - traefik.http.middlewares.aawebtools-headers.headers.STSIncludeSubdomains=true
      - traefik.http.middlewares.aawebtools-headers.headers.browserXSSFilter=true
      - traefik.http.middlewares.aawebtools-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.aawebtools-headers.headers.forceSTSHeader=true
      - traefik.http.middlewares.aawebtools-headers.headers.frameDeny=true
      - traefik.http.middlewares.aawebtools-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.aawebtools-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()
      # www redirect to non-www
      - traefik.http.middlewares.aawebtools-www.redirectregex.regex=^https://www\.aawebtools\.com/(.*)
      - traefik.http.middlewares.aawebtools-www.redirectregex.replacement=https://aawebtools.com/$${1}
      - traefik.http.middlewares.aawebtools-www.redirectregex.permanent=true
      - traefik.http.routers.aawebtools.middlewares=aawebtools-headers@docker,aawebtools-www@docker
      # Compression
      - traefik.http.middlewares.aawebtools-compress.compress=true
    restart: always
    networks:
      - shared-network
      - aawebtools-internal

  # Node.js API — downloaders + humanizer
  aawebtools-api:
    build: ./api
    container_name: aawebtools-api
    env_file: .env
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: always
    networks:
      - aawebtools-internal

  # Python API (skeleton)
  aawebtools-python:
    build: ./python-api
    container_name: aawebtools-python
    expose:
      - "8000"
    restart: always
    networks:
      - aawebtools-internal

networks:
  shared-network:
    external: true
  aawebtools-internal:
    driver: bridge
