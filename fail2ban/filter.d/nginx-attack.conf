# nginx-attack.conf — Fail2ban filter for common attack path probing
# Matches requests to paths commonly targeted by bots and attackers
# Single match triggers 24-hour ban

[Definition]
failregex = ^<HOST> .* "(GET|POST|PUT|DELETE|HEAD) /(wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|\.env|\.git|cgi-bin|phpmyadmin|pma|admin|myadmin|mysql|dbadmin|setup\.php|config\.php|\.htaccess|\.htpasswd|vendor|node_modules|\.aws|\.ssh|backup|\.bak|\.sql|\.tar|\.zip|shell|eval-stdin) .* HTTP/[12]\.[01]"
ignoreregex =
