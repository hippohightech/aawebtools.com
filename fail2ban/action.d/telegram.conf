# telegram.conf — Fail2ban action to send Telegram notifications on ban
# PRD Section 0.4: Send Telegram notification to owner on ban
#
# Requires TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID in environment
# or replace the placeholders below with actual values on the server.

[Definition]

actionstart =
actionstop =
actioncheck =

actionban = curl -s -X POST "https://api.telegram.org/bot%(telegram_bot_token)s/sendMessage" \
            -d chat_id="%(telegram_chat_id)s" \
            -d parse_mode="HTML" \
            -d text="<b>[aawebtools] Fail2ban Alert</b>%0A%0A<b>Jail:</b> <name>%0A<b>IP Banned:</b> <ip>%0A<b>Failures:</b> <failures>%0A<b>Time:</b> $(date '+%%Y-%%m-%%d %%H:%%M:%%S %%Z')"

actionunban =

[Init]
# These defaults are overridden by jail.local action parameters.
# Run scripts/configure-fail2ban.sh after deploy to inject real values.
telegram_bot_token =
telegram_chat_id =
